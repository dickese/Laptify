server:
  port: 8080
spring:
  servlet:
    multipart:
      enabled: true
      max-file-size: 10MB
      max-request-size: 50MB
  datasource:
    url: ${DB_URL:jdbc:mariadb://localhost:3307/laptify_db}
    username: ${DB_USERNAME:root}
    password: ${DB_PASSWORD:18112005@Duc}
    driver-class-name: org.mariadb.jdbc.Driver
  jpa:
    properties:
      hibernate:
        dialect: org.hibernate.dialect.MariaDBDialect
        format_sql: true
    hibernate:
      ddl-auto: create

security:
  jwt:
    secret-key: ${JWT_SECRET_KEY:your_secret_key_here}
    issuer: ${JWT_ISSUER:Laptify}
    expiration-ms: ${JWT_EXPIRATION_MS:3600000} # 1 hour
    refresh-expiration-ms: ${JWT_REFRESH_EXPIRATION_MS:86400000} # 24 hours